# Flashblocks WebSocket 地址
WS_URL: "ws://localhost:7546"

# XLayer RPC 地址
RPC_URL: "http://localhost:8545"

# Lark 配置 (xmonitor 格式)
APM_BOT_URL: ""
LARK_GROUP_ID: ""

# 是否开启 Lark 告警 (false 时仅打日志不发消息)
ALERT_ENABLED: false

# Alert 1: flashblock 接收延迟阈值（毫秒）
MAX_FLASHBLOCK_DELAY_MS: 1000

# Alert 2: 收到 tx 后延迟多久反查区块（毫秒）
TX_CHECK_DELAY_MS: 1000

# Lark 告警限频间隔（秒）
ALERT_RATE_LIMIT_S: 30

# WebSocket 长时间连不上告警阈值（秒）
WS_LONG_DOWN_THRESHOLD_S: 60

# Alert 2 批量验证超时兜底（秒），超过此时间未收到新 block header 则强制触发验证
VERIFY_TIMEOUT_S: 5

# RPC 请求超时（秒）
RPC_TIMEOUT_S: 10

# 是否开启详细日志
VERBOSE: false

# Conductor 地址 (逗号分隔)
CONDUCTOR_URL: "http://localhost:8547,http://localhost:8548"

# Peer status 轮询间隔（秒）
PEER_STATUS_POLL_INTERVAL_S: 30